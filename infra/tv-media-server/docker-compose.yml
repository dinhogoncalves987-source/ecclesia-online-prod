version: "3.9"

services:
  # ── MediaMTX: ingest RTMP/SRT → geração de HLS ──────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: ecclesia-mediamtx
    restart: unless-stopped
    network_mode: host          # necessário para RTMP na porta 1935
    environment:
      - MTX_LOGLEVEL=info
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
      - ./scripts:/scripts
      - hls_data:/hls
    ports:
      - "1935:1935"             # RTMP
      - "8554:8554"             # RTSP
      - "8000:8000"             # RTP/UDP
      - "8001:8001"             # RTP/TCP
      - "8888:8888"             # HLS interno (acessado via Nginx)
      - "8889:8889"             # WebRTC
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9997/v3/paths/list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx: reverse proxy HTTPS + servir HLS via CDN ──────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ecclesia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf.example:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/ecclesia:ro        # certificados SSL (Let's Encrypt)
      - hls_data:/var/www/hls:ro          # serve os segmentos HLS
      - ./recordings:/var/www/recordings:ro
    depends_on:
      - mediamtx
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Heartbeat Monitor: verifica transmissões ativas ──────────────────────────
  heartbeat-monitor:
    image: alpine:3.19
    container_name: ecclesia-heartbeat
    restart: unless-stopped
    depends_on:
      - mediamtx
    env_file:
      - .env
    volumes:
      - ./scripts:/scripts:ro
    command: >
      sh -c "apk add --no-cache curl &&
             while true; do
               sh /scripts/heartbeat_monitor.sh;
               sleep 30;
             done"

volumes:
  hls_data:
    driver: local
