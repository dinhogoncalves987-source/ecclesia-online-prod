services:
  whatsapp-gateway:
    build: .
    container_name: ecclesia-whatsapp-gateway
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - NODE_ENV=production
      - MOCK_MODE=${MOCK_MODE:-false}
      - GATEWAY_API_KEY=${GATEWAY_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./auth_info_baileys:/app/auth_info_baileys
      - ./logs:/app/logs
    networks:
      - ecclesia-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  ecclesia-network:
    external: true
    name: ecclesia-network
