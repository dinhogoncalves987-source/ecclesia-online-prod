server {
    listen 80;
    server_name gateway.ecclesia.com.br;

    # Redirecionar para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gateway.ecclesia.com.br;

    ssl_certificate     /etc/letsencrypt/live/gateway.ecclesia.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.ecclesia.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Rate limiting Nginx (adicional ao do Node.js)
    limit_req_zone $binary_remote_addr zone=gateway:10m rate=30r/m;
    limit_req zone=gateway burst=10 nodelay;

    location / {
        proxy_pass         http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
